<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تسجيل الدخول</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo&display=swap');

    body {
      margin: 0; padding: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #f0f0f0;
      direction: rtl;
    }

    .container {
      background: rgba(30, 30, 30, 0.9);
      padding: 40px 50px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.7);
      width: 350px;
      text-align: center;
    }

    .container h1 {
      margin-bottom: 25px;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: right;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 16px;
      color: #a0a0a0;
    }

    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px 15px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 15px;
      transition: 0.3s;
      background-color: #2a2a2a;
      color: #eee;
    }

    input[type="text"]:focus, input[type="password"]:focus {
      background-color: #3a3a3a;
      box-shadow: 0 0 6px #6195ff;
    }

    button {
      width: 100%;
      padding: 14px 0;
      border: none;
      border-radius: 10px;
      background: linear-gradient(45deg, #6195ff, #3761ff);
      color: white;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s;
      box-shadow: 0 4px 10px rgba(97, 149, 255, 0.7);
    }

    button:hover {
      background: linear-gradient(45deg, #3761ff, #6195ff);
      box-shadow: 0 6px 14px rgba(55, 97, 255, 0.9);
    }

    .footer-text {
      margin-top: 30px;
      font-size: 14px;
      color: #888;
      user-select: none;
    }

    /* تحريك بسيط */
    @keyframes floatIn {
      0% {opacity: 0; transform: translateY(-30px);}
      100% {opacity: 1; transform: translateY(0);}
    }

    .container {
      animation: floatIn 0.8s ease forwards;
    }
  </style>
</head>
<body>
  <div class="container" role="main" aria-label="نموذج تسجيل دخول">
    <h1>تسجيل الدخول</h1>
    <form action="/honeypot" method="POST" autocomplete="off" spellcheck="false" novalidate>
      <div class="input-group">
        <label for="username">اسم المستخدم</label>
        <input type="text" id="username" name="username" required placeholder="أدخل اسم المستخدم" autofocus />
      </div>
      <div class="input-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" name="password" required placeholder="أدخل كلمة المرور" />
      </div>
      <button type="submit" aria-label="تسجيل الدخول">دخول</button>
    </form>
    <p class="footer-text">© 2025 النظام الخاص بالتوثيق</p>
  </div>
</body>
</html>
