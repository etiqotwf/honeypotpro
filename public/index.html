<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>Threat Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0/dist/tf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
    }
    h1 { color: #ffd700; margin-bottom: 20px; font-size: 28px; }
    #threatChart { height: 250px; max-height: 250px; }
    .filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    input, select, button { background: #161b22; color: #ffffff; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; font-size: 14px; }
    .table-container { max-height: 300px; overflow-y: auto; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 30px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #30363d; }
    th { background-color: #222; color: #ffd700; font-weight: bold; font-size: 16px; }
    td { color: #ffffff; padding: 12px 10px; border: 1px solid #333; font-size: 15px; }
    tr:nth-child(even) { background-color: #1f2937; }
    #threatChart { max-width: 100%; margin-bottom: 40px; }
    form { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    button { cursor: pointer; background-color: #238636; color: white; transition: background 0.3s; }
    button:hover { background-color: #2ea043; }
    .icon { color: #58a6ff; margin-right: 5px; }
    @media (max-width: 600px) { .filters, form { flex-direction: column; align-items: stretch; } }
  </style>
</head>
<body>
  <div style="margin-top: 30px;">
    <h3>Manual Log Analyzer (AI)</h3>
    <input type="text" id="log-input" placeholder="Enter raw log line..." style="width: 60%; padding: 10px;" />
    <button id="generate-btn" style="padding: 10px 15px; background-color:#007bff;">Get latest real log</button>
    <button id="analyze-btn" style="padding: 10px 15px;">Analyze</button>
  </div>

  <h1><i class="fas fa-shield-alt icon"></i> Threat Monitoring Dashboard</h1>

  <div class="filters">
    <input type="text" id="filterIP" placeholder="🔍 Filter by IP">
    <select id="filterType">
      <option value="">All Threats</option>
      <option value="malware detected">Malware</option>
      <option value="scan attempt">Scan</option>
      <option value="attack vector">Attack</option>
    </select>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>IP Address</th>
          <th>Method</th>
          <th>Threat Type</th>
          <th>Action Taken</th>
        </tr>
      </thead>
      <tbody id="logTableBody"></tbody>
    </table>
  </div>

  <canvas id="threatChart" height="120"></canvas>

  <h3 style="margin-top: 20px;">Add Fake Threat</h3>
  <form id="addForm">
    <input type="text" name="ip" placeholder="IP" required>
    <select name="method"><option>GET</option><option>POST</option></select>
    <select name="type">
      <option value="malware detected">Malware</option>
      <option value="scan attempt">Scan</option>
      <option value="attack vector">Attack</option>
    </select>
    <button type="submit"><i class="fas fa-plus-circle icon"></i> Add</button>
  </form>

<script>
  let allLogs = [];
  let chartRef = null;

  // رابط الموقع اللي طلبت استخدامه (ضع هنا الرابط الصحيح لو مختلف)
  const REMOTE_BASE = 'https://etiqotwf.github.io/honeypotpro/public';
  // CORS proxy (تغيير لو عندك proxy آخر)
  const CORS = 'https://corsproxy.io/?';

  async function fetchCSV(url) {
    try {
      const res = await fetch(CORS + url, { cache: 'no-store' });
      if (!res.ok) throw new Error('CSV fetch failed ' + res.status);
      const text = await res.text();
      return text;
    } catch (err) {
      console.warn('CSV fetch error:', err);
      return null;
    }
  }

  async function fetchJSON(url) {
    try {
      const res = await fetch(CORS + url, { cache: 'no-store' });
      if (!res.ok) throw new Error('JSON fetch failed ' + res.status);
      return await res.json();
    } catch (err) {
      console.warn('JSON fetch error:', err);
      return null;
    }
  }

  // يحاول الحصول على أحدث سطر من CSV أو أول عنصر من JSON
  async function fetchLatestRemoteLog() {
    // Try CSV first (common for logs)
    const csvPath = REMOTE_BASE + '/logs/threats.csv';
    const csvText = await fetchCSV(csvPath);
    if (csvText) {
      const rows = csvText.trim().split('\n').filter(r => r.trim());
      if (rows.length > 1) { // افترض السطر الأول headers
        const last = rows[rows.length - 1];
        const parts = last.split(',').map(p => p.trim());
        // توقع الأعمدة: timestamp, ip, method, threatType, action?
        const timestamp = parts[0] || new Date().toISOString();
        const ip = parts[1] || '0.0.0.0';
        const method = parts[2] || 'GET';
        const threatType = parts[3] || 'unknown threat';
        const action = (parts[4] || '').trim();
        const raw = `${timestamp} ${ip} ${method} ${threatType}`;
        return { timestamp, ip, method, threatType, action, raw };
      }
    }

    // Try JSON endpoints (common alternative)
    const jsonCandidates = [
      REMOTE_BASE + '/logs/recent.json',
      REMOTE_BASE + '/logs/latest.json',
      REMOTE_BASE + '/logs/logs.json'
    ];
    for (const p of jsonCandidates) {
      const j = await fetchJSON(p);
      if (j) {
        // If array, take first or last
        if (Array.isArray(j) && j.length > 0) {
          const item = j[j.length - 1] || j[0];
          // try map fields
          const timestamp = item.timestamp || item.time || new Date().toISOString();
          const ip = item.ip || item.src || item.source || '0.0.0.0';
          const method = item.method || item.verb || 'GET';
          const threatType = item.threatType || item.type || item.attack || 'unknown threat';
          const action = item.action || '';
          const raw = item.raw || `${timestamp} ${ip} ${method} ${threatType}`;
          return { timestamp, ip, method, threatType, action, raw };
        } else if (typeof j === 'object' && Object.keys(j).length) {
          // single object
          const timestamp = j.timestamp || new Date().toISOString();
          const ip = j.ip || '0.0.0.0';
          const method = j.method || 'GET';
          const threatType = j.threatType || 'unknown threat';
          const action = j.action || '';
          const raw = j.raw || `${timestamp} ${ip} ${method} ${threatType}`;
          return { timestamp, ip, method, threatType, action, raw };
        }
      }
    }

    // If everything fails, return null
    return null;
  }

  function filterLogs(logs) {
    const ipFilter = document.getElementById('filterIP').value.trim();
    const typeFilter = document.getElementById('filterType').value;
    return logs.filter(log =>
      (!ipFilter || (log.ip && log.ip.includes(ipFilter))) &&
      (!typeFilter || log.threatType === typeFilter)
    );
  }

  function renderTable(logs) {
    const tbody = document.getElementById('logTableBody');
    tbody.innerHTML = '';
    logs.forEach(log => {
      const actionDisplay = log.action || 'N/A';
      tbody.innerHTML += `
        <tr>
          <td>${log.timestamp}</td>
          <td>${log.ip}</td>
          <td>${log.method}</td>
          <td>${log.threatType}</td>
          <td style="font-weight:bold;">${actionIcon(log.action)}</td>
        </tr>`;
    });
  }

  function drawThreatChart(logs) {
    const filtered = filterLogs(logs);
    const threatCounts = {};
    filtered.forEach(t => { threatCounts[t.threatType] = (threatCounts[t.threatType] || 0) + 1; });
    const labels = Object.keys(threatCounts);
    const dataValues = Object.values(threatCounts);
    const ctx = document.getElementById('threatChart').getContext('2d');
    if (chartRef) chartRef.destroy();
    chartRef = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Threat Count', data: dataValues, backgroundColor: ['#d32f2f', '#fbc02d', '#1976d2'], borderRadius: 8 }] },
      options: {
        plugins: {
          legend: { labels: { color: '#fff' } },
          title: { display: true, text: 'Threat Type Statistics', color: '#58a6ff' }
        },
        scales: { x: { ticks: { color: '#ccc' }, grid: { display: false } }, y: { beginAtZero: true, ticks: { color: '#ccc' }, grid: { color: '#333' } } }
      }
    });
  }

  // existing actionIcon helper
  function actionIcon(action) {
    if (!action) return '<span style="color:gray;">ℹ️</span> ℹ️ INFO';
    switch (String(action).toLowerCase()) {
      case 'blocked': case 'block': return '<span style="color:red;">❌</span> BLOCKED';
      case 'suspicious': case 'alerted': case 'alert': return '<span style="color:orange;">⚠️</span> ALERTED';
      case 'allowed': case 'logged': case 'log': return '<span style="color:green;">✅</span> LOGGED';
      case 'ignore': case 'ignored': return '<span style="color:gray;">ℹ️</span> IGNORED';
      default: return '<span style="color:gray;">ℹ️</span> INFO';
    }
  }

  // model-related functions (نفس اللي عندك، هنا للاكتمال — تأكد إن model.json موجود في نفس المسار)
  const MODEL_URL = './model.json';
  const ACTIONS = ['block', 'alert', 'ignore'];
  const LEARNING_RATE = 0.01;

  function encodeState(log) {
    const s = typeof log === 'string' ? log : (log.raw || JSON.stringify(log));
    const ipSuspicion = s.includes('192.168') ? 0 : 1;
    const requestType = s.includes('POST') ? 1 : 0;
    const keywordDetected = /(malware|attack|scan|sql|xss)/i.test(s) ? 1 : 0;
    return [ipSuspicion, requestType, keywordDetected, 0, 0, 0, 0, 0];
  }

  async function loadModel() {
    try {
      const model = await tf.loadLayersModel(MODEL_URL);
      model.compile({ optimizer: tf.train.adam(LEARNING_RATE), loss: 'categoricalCrossentropy' });
      return model;
    } catch (err) {
      console.error('Model load failed:', err);
      return null;
    }
  }

  async function selectAction(model, state) {
    if (!model) return 'ignore';
    const input = tf.tensor2d([state]);
    const prediction = model.predict(input);
    const actionIdx = (await prediction.argMax(1).data())[0];
    return ACTIONS[actionIdx] || 'ignore';
  }

  function prependLogToTable(log) {
    const tbody = document.getElementById('logTableBody');
    const newRow = document.createElement('tr');
    newRow.innerHTML = `
      <td>${log.timestamp}</td>
      <td>${log.ip}</td>
      <td>${log.method}</td>
      <td style="font-weight:bold;">${log.threatType}</td>
      <td style="font-weight:bold;">${actionIcon(log.action)}</td>
    `;
    tbody.prepend(newRow);
  }

  async function analyzeLog(rawLog, model) {
    const state = encodeState(rawLog);
    const action = await selectAction(model, state);
    const parts = (typeof rawLog === 'string' ? rawLog : (rawLog.raw || '')).split(' ');
    const timestamp = parts[0] || new Date().toISOString();
    const ip = parts[1] || (rawLog.ip || '0.0.0.0');
    const method = parts[2] || (rawLog.method || 'GET');

    const attackTypes = ['malware detected', 'scan attempt', 'attack vector'];
    const matchedType = attackTypes.find(type => (rawLog.raw || rawLog).toLowerCase().includes(type)) || (rawLog.threatType || 'unknown threat');

    const analyzedLog = { timestamp, ip, method, threatType: matchedType, action };
    prependLogToTable(analyzedLog);
    allLogs.unshift(analyzedLog);
    drawThreatChart(allLogs);
  }

  // Generate button now fetches latest real log and analyzes it
  document.getElementById('generate-btn').addEventListener('click', async () => {
    document.getElementById('generate-btn').textContent = 'Fetching...';
    try {
      const latest = await fetchLatestRemoteLog();
      if (!latest) {
        alert('لم يتم العثور على سجل جديد في المصدر البعيد. تأكد من وجود ملف logs/threats.csv أو JSON في المسار: ' + REMOTE_BASE + '/logs/');
        console.warn('No remote log found');
        document.getElementById('generate-btn').textContent = 'Get latest real log';
        return;
      }

      // افتح الموديل وحلّل
      const model = await loadModel();
      await analyzeLog(latest, model);
      document.getElementById('log-input').value = latest.raw || `${latest.timestamp} ${latest.ip} ${latest.method} ${latest.threatType}`;
    } catch (err) {
      console.error('Error getting remote log:', err);
      alert('حدث خطأ أثناء جلب السجل البعيد — راجع الـ console.');
    } finally {
      document.getElementById('generate-btn').textContent = 'Get latest real log';
    }
  });

  // Analyze button: يحلل النص الموجود في input كالسابق
  document.getElementById('analyze-btn')?.addEventListener('click', async () => {
    const logInput = document.getElementById('log-input')?.value.trim();
    if (!logInput) return alert('ادخل سطر لوج للتحليل');
    const model = await loadModel();
    analyzeLog(logInput, model);
  });

  // form إضافة يدوي يرسل للـ API كما عندك
  document.getElementById('addForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const newThreat = { ip: form.ip.value, method: form.method.value, threatType: form.type.value };
    try {
      const res = await fetch('/api/add-threat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newThreat) });
      if (res.ok) { form.reset(); updateDashboard(); } else alert('❌ Failed to send threat to server.');
    } catch (err) { console.error(err); alert('خطأ بالاتصال بالـ API'); }
  });

  // updateDashboard يحاول تحميل الـ CSV من remote (نفس المنطق)
  async function updateDashboard() {
    const csvText = await fetchCSV(REMOTE_BASE + '/logs/threats.csv');
    if (csvText) {
      const rows = csvText.trim().split('\n').slice(1).filter(r => r.trim());
      allLogs = rows.map(row => {
        const parts = row.split(',').map(p => p.trim());
        return { timestamp: parts[0] || '', ip: parts[1] || '', method: parts[2] || '', threatType: parts[3] || '', action: parts[4] || '' };
      }).reverse(); // latest first
    }
    renderTable(filterLogs(allLogs));
    drawThreatChart(allLogs);
  }

  // استمع للفلاتر
  document.getElementById('filterIP').addEventListener('input', () => { renderTable(filterLogs(allLogs)); drawThreatChart(allLogs); });
  document.getElementById('filterType').addEventListener('change', () => { renderTable(filterLogs(allLogs)); drawThreatChart(allLogs); });

  // تحميل أولي
  updateDashboard();
</script>
</body>
</html>
